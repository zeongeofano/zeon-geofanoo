<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeon Geofano | Forge Future</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0b10;
            --neon-blue: #00d4ff;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            /* Animasi bintang halus di background */
            background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0);
            background-size: 40px 40px;
        }

        /* Latar Belakang Bergerak */
        .background-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .background-overlay::before, .background-overlay::after {
            content: "";
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
        }

        .background-overlay::before {
            background: rgba(0, 212, 255, 0.1);
            top: -10%; left: -10%;
            animation: drift 15s infinite alternate ease-in-out;
        }

        .background-overlay::after {
            background: rgba(0, 80, 255, 0.07);
            bottom: -10%; right: -10%;
            animation: drift 20s infinite alternate-reverse ease-in-out;
        }

        @keyframes drift {
            from { transform: translate(0, 0); }
            to { transform: translate(150px, 100px); }
        }

        .container {
            width: 90%;
            max-width: 600px;
            padding: 60px 0;
            z-index: 1;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 35px;
            margin-bottom: 25px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .logo-neon {
            width: 70px;
            height: 70px;
            border: 2px solid var(--neon-blue);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            font-weight: bold;
            color: var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
            margin: 0 auto 20px auto;
        }

        h1 {
            font-size: 2.2rem;
            color: var(--neon-blue);
            text-shadow: 0 0 15px rgba(0, 212, 255, 0.5);
            margin-bottom: 10px;
        }

        .subtitle { opacity: 0.7; font-weight: 300; letter-spacing: 1px; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }

        .stat-card { padding: 20px; text-align: left; }
        .stat-card h3 { font-size: 0.9rem; opacity: 0.6; margin-bottom: 5px; }
        .stat-card p { font-weight: bold; font-size: 1.1rem; }

        /* Tombol Berfungsi */
        .btn-container { display: flex; flex-direction: column; gap: 15px; margin-top: 10px; }

        .btn {
            padding: 16px;
            border-radius: 16px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
            display: block;
        }

        .btn-neon {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
        }

        .btn-outline {
            background: transparent;
            color: white;
            border: 1px solid var(--glass-border);
        }

        .btn:active { transform: scale(0.96); }
        .btn:hover { filter: brightness(1.2); }

        footer { opacity: 0.4; font-size: 0.8rem; margin-top: 40px; }
    </style>
</head>
<body>
    <div class="background-overlay"></div>
    
    <div class="container">
        <header class="glass-card">
            <div class="logo-neon">F</div>
            <h1>Zeon Geofano</h1>
            <p class="subtitle">Systems Architect • Asset Management</p>
        </header>

        <div class="grid">
            <div class="glass-card stat-card">
                <h3>Venture</h3>
                <p>Forge Future</p>
            </div>
            <div class="glass-card stat-card">
                <h3>Status</h3>
                <p>Building...</p>
            </div>
        </div>

        <div class="glass-card">
            <div class="btn-container">
                <a href="https://docs.google.com/spreadsheets/d/1bmbAF_ugeEGiLvHeadxXp1MrDutEwggGBuJqTsDIRgE/edit" class="btn btn-neon" target="_blank">View Trading Journal</a>
                
                <a href="https://github.com/username-kamu" class="btn btn-outline" target="_blank">GitHub Projects</a>
            </div>
        </div>

        <center><footer>&copy; 2026 FORGE FUTURE • BY ZEON</footer></center>
    </div>
</body>
    </html>
